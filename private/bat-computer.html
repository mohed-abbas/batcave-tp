<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bat-Ordinateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a2238 0%, #0a0e1c 60%, #000 100%);
      color: #e4e6eb;
      font-family: 'Segoe UI', sans-serif;
    }
    .bat-header {
      border-bottom: 1px solid #2a3550;
      padding: 2rem 0;
      text-align: center;
    }
    .bat-title {
      letter-spacing: 0.15em;
      color: #5fb2ff;
    }
    .gadget-card {
      background: rgba(20, 25, 45, 0.95);
      border: 1px solid #2a3550;
      color: #e4e6eb;
      transition: transform 0.2s, box-shadow 0.2s;
      height: 100%;
    }
    .gadget-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(95, 178, 255, 0.25);
      border-color: #5fb2ff;
    }
    .gadget-icon {
      font-size: 2.5rem;
      color: #5fb2ff;
    }
    .report-card {
      background: rgba(20, 25, 45, 0.95);
      border: 1px solid #2a3550;
    }
    textarea.form-control {
      background: #0e1426;
      border-color: #2a3550;
      color: #e4e6eb;
    }
    textarea.form-control:focus {
      background: #0e1426;
      color: #e4e6eb;
      border-color: #5fb2ff;
      box-shadow: 0 0 0 0.2rem rgba(95, 178, 255, 0.25);
    }
  </style>
</head>
<body>
  <header class="bat-header">
    <i class="fa-solid fa-bat fa-3x" style="color:#5fb2ff;"></i>
    <h1 class="bat-title mt-3">BAT-ORDINATEUR</h1>
    <p id="welcome" class="lead text-info">Authentification...</p>
  </header>

  <main class="container py-5">
    <section>
      <h3 class="mb-4"><i class="fa-solid fa-toolbox me-2"></i>Arsenal disponible</h3>
      <div id="arsenal" class="row g-4">
        <div class="text-center text-muted">Chargement de l'arsenal...</div>
      </div>
    </section>

    <section class="mt-5">
      <div class="card report-card p-4">
        <h3 class="mb-3"><i class="fa-solid fa-file-pen me-2"></i>Nouveau rapport de mission</h3>
        <form id="reportForm">
          <div class="mb-3">
            <textarea id="reportContent" class="form-control" rows="4" placeholder="Décrivez la mission..."></textarea>
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-paper-plane me-2"></i>Enregistrer
          </button>
          <span id="reportFeedback" class="ms-3"></span>
        </form>
      </div>
    </section>
  </main>

  <script>
    function getCredentials() {
      return sessionStorage.getItem('batcave_creds');
    }

    function authHeaders(extra = {}) {
      const creds = getCredentials();
      return creds ? { Authorization: 'Basic ' + creds, ...extra } : extra;
    }

    async function loadMe() {
      const res = await fetch('/api/me', { headers: authHeaders() });
      if (!res.ok) {
        document.getElementById('welcome').textContent = 'Authentification échouée — rechargez la page';
        return null;
      }
      const data = await res.json();
      document.getElementById('welcome').innerHTML =
        `Bienvenue, Justicier <strong>${data.username}</strong>`;
      return data;
    }

    async function loadArsenal() {
      const res = await fetch('/api/secrets', { headers: authHeaders() });
      const arsenal = document.getElementById('arsenal');
      if (!res.ok) {
        arsenal.innerHTML = '<div class="text-danger">Accès refusé à l\'arsenal.</div>';
        return;
      }
      const gadgets = await res.json();
      arsenal.innerHTML = gadgets.map(g => `
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card gadget-card p-4 text-center">
            <i class="fa-solid ${g.icon} gadget-icon mb-3"></i>
            <h5 class="card-title">${g.name}</h5>
            <p class="card-text text-muted">${g.desc}</p>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('reportContent').value.trim();
      const fb = document.getElementById('reportFeedback');
      if (!content) {
        fb.innerHTML = '<span class="text-warning">Rapport vide.</span>';
        return;
      }
      const res = await fetch('/api/reports', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ content })
      });
      if (res.ok) {
        fb.innerHTML = '<span class="text-success">Rapport enregistré.</span>';
        document.getElementById('reportContent').value = '';
      } else {
        fb.innerHTML = '<span class="text-danger">Échec de l\'enregistrement.</span>';
      }
    });

    loadMe();
    loadArsenal();
  </script>
</body>
</html>
