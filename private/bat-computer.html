<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bat-Ordinateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a2238 0%, #0a0e1c 60%, #000 100%);
      color: #e4e6eb;
      font-family: 'Segoe UI', sans-serif;
    }
    .bat-header {
      border-bottom: 1px solid #2a3550;
      padding: 2rem 0;
      text-align: center;
    }
    .bat-title {
      letter-spacing: 0.15em;
      color: #5fb2ff;
    }
  </style>
</head>
<body>
  <header class="bat-header">
    <i class="fa-solid fa-bat fa-3x" style="color:#5fb2ff;"></i>
    <h1 class="bat-title mt-3">BAT-ORDINATEUR</h1>
    <p class="lead text-info">Acces autorise</p>
  </header>
</body>
</html>
