<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Registre des Justiciers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body class="center-screen">
  <div class="card card-batcave p-4">
    <div class="text-center mb-3">
      <i class="fa-solid fa-mask fa-3x" style="color:#5fb2ff;"></i>
      <h2 class="bat-title mt-2">REGISTRE DES JUSTICIERS</h2>
      <p class="text-muted small">Inscription au système de sécurité de la Batcave</p>
    </div>

    <form id="registerForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" name="username" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe (min. 8 caractères)</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-user-plus me-2"></i>S'inscrire
      </button>
    </form>

    <div id="feedback" class="mt-3"></div>

    <div class="text-center mt-3">
      <a href="/bat-computer" class="text-info small">
        <i class="fa-solid fa-arrow-right-to-bracket me-1"></i>Accès au Bat-Ordinateur
      </a>
    </div>
  </div>

  <script src="/batcave-client.js"></script>
  <script src="/register.js"></script>
</body>
</html>
