<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Enregistrement opérateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Saira+Condensed:wght@500;600;700&family=Saira+Stencil+One&display=swap" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body class="center-screen">
  <main class="terminal">
    <span class="reticle-corner tl"></span>
    <span class="reticle-corner tr"></span>
    <span class="reticle-corner bl"></span>
    <span class="reticle-corner br"></span>

    <div class="text-center">
      <span class="signal"><i class="fa-solid fa-mask"></i></span>
      <p class="eyebrow mt-3 mb-0">Batcave · Registre</p>
      <h1 class="wordmark">Nouvel opérateur</h1>
      <p class="lede">Enregistrement au système de sécurité de la Batcave.</p>
    </div>

    <form id="registerForm" class="mt-4" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Identifiant opérateur</label>
        <input type="text" class="form-control" id="username" name="username" required autocomplete="username" />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe (min. 8 caractères)</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Enregistrer l'opérateur</button>
    </form>

    <div id="feedback" class="mt-3"></div>

    <p class="text-center mt-3 mb-0">
      <a href="/auth/login" class="eyebrow">Déjà enregistré — accéder au terminal</a>
    </p>
  </main>

  <script src="/batcave-client.js"></script>
  <script src="/register.js"></script>
</body>
</html>
