<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Registre des Justiciers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a2238 0%, #0a0e1c 60%, #000 100%);
      color: #e4e6eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card-batcave {
      background: rgba(20, 25, 45, 0.95);
      border: 1px solid #2a3550;
      box-shadow: 0 0 40px rgba(80, 180, 255, 0.15);
      max-width: 440px;
      width: 100%;
    }
    .form-control {
      background: #0e1426;
      border-color: #2a3550;
      color: #e4e6eb;
    }
    .form-control:focus {
      background: #0e1426;
      color: #e4e6eb;
      border-color: #5fb2ff;
      box-shadow: 0 0 0 0.2rem rgba(95, 178, 255, 0.25);
    }
    .bat-title {
      letter-spacing: 0.15em;
      color: #5fb2ff;
    }
  </style>
</head>
<body>
  <div class="card card-batcave p-4">
    <div class="text-center mb-3">
      <i class="fa-solid fa-mask fa-3x" style="color:#5fb2ff;"></i>
      <h2 class="bat-title mt-2">REGISTRE DES JUSTICIERS</h2>
      <p class="text-muted small">Inscription au système de sécurité de la Batcave</p>
    </div>

    <form id="registerForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" name="username" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe (min. 8 caractères)</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-user-plus me-2"></i>S'inscrire
      </button>
    </form>

    <div id="feedback" class="mt-3"></div>

    <div class="text-center mt-3">
      <a href="/bat-computer" class="text-info small">
        <i class="fa-solid fa-arrow-right-to-bracket me-1"></i>Accès au Bat-Ordinateur
      </a>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
