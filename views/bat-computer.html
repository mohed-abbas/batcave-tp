<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bat-Ordinateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body>
  <header class="bat-header position-relative">
    <i class="fa-solid fa-bat fa-3x bat-icon"></i>
    <h1 class="bat-title mt-3">BAT-ORDINATEUR</h1>
    <!-- {{username}} injecté côté serveur depuis le payload du jeton (req.user) -->
    <p id="welcome" class="lead text-info">Bienvenue, Justicier <strong>{{username}}</strong></p>
    <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm position-absolute bat-logout">
      <i class="fa-solid fa-right-from-bracket me-1"></i>Déconnexion
    </button>
  </header>

  <main class="container py-5">
    <section>
      <h3 class="mb-4"><i class="fa-solid fa-toolbox me-2"></i>Arsenal disponible</h3>
      <div id="arsenal" class="row g-4">
        <div class="text-center text-muted">Chargement de l'arsenal...</div>
      </div>
    </section>

    <section class="mt-5">
      <div class="card bat-surface p-4">
        <h3 class="mb-3"><i class="fa-solid fa-file-pen me-2"></i>Nouveau rapport de mission</h3>
        <form id="reportForm">
          <div class="mb-3">
            <textarea id="reportContent" class="form-control" rows="4" placeholder="Décrivez la mission..."></textarea>
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-paper-plane me-2"></i>Enregistrer
          </button>
          <span id="reportFeedback" class="ms-3"></span>
        </form>
      </div>
    </section>

    <!-- Zone ADMIN : masquée par défaut, et surtout protégée côté serveur.
         Masquer un bouton n'est pas une sécurité, c'est checkRole qui l'est. -->
    <section id="adminZone" class="mt-5 d-none">
      <div class="card bat-surface p-4">
        <h3 class="mb-3"><i class="fa-solid fa-clipboard-list me-2"></i>Journal des accès</h3>
        <ul id="logList" class="list-group list-group-flush"></ul>
      </div>
    </section>
  </main>

  <script src="/batcave-client.js"></script>
  <script src="/bat-computer.js"></script>
</body>
</html>
