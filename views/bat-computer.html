<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bat-Ordinateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Saira+Condensed:wght@500;600;700&family=Saira+Stencil+One&display=swap" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body>
  <!-- Barre d'état HUD. {{username}} injecté côté serveur (échappé) depuis req.user. -->
  <header class="hud">
    <div class="hud__id">
      <span class="signal signal--sm"><svg class="signal__bat" viewBox="0 0 120 46" aria-hidden="true"><g fill="currentColor"><path d="M60 16 L64 6 L68 15 C80 6 98 6 112 16 C106 24 100 12 92 30 C88 22 82 14 72 30 C68 24 64 24 60 40 Z"/><path d="M60 16 L56 6 L52 15 C40 6 22 6 8 16 C14 24 20 12 28 30 C32 22 38 14 48 30 C52 24 56 24 60 40 Z"/></g></svg></span>
      <div class="hud__titles">
        <h1 class="hud__title">Bat-Ordinateur</h1>
        <p class="hud__op">Opérateur : <strong>{{username}}</strong> · session active</p>
      </div>
    </div>
    <div class="hud__spacer"></div>
    <span id="roleBadge" class="role-badge">Habilitation : —</span>
    <button id="logoutBtn" type="button" class="btn btn-ghost btn-sm">
      <i class="fa-solid fa-power-off me-1"></i>Fermer la session
    </button>
  </header>

  <div class="ops">
    <section>
      <div class="section-head"><h2>Arsenal</h2></div>
      <div id="arsenal" class="row g-3">
        <div class="muted-note">Chargement de l'arsenal…</div>
      </div>
    </section>

    <section>
      <div class="section-head"><h2>Rapport de mission</h2></div>
      <div class="panel">
        <form id="reportForm">
          <div class="mb-3">
            <label for="reportContent" class="form-label">Consigner un événement</label>
            <textarea id="reportContent" class="form-control" rows="4"
                      placeholder="Décrivez la mission…"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Transmettre</button>
          <span id="reportFeedback" class="ms-3"></span>
        </form>
      </div>
    </section>

    <!-- Zone ADMIN : masquée par défaut, et surtout protégée côté serveur.
         Masquer la section n'est pas une sécurité, c'est checkRole qui l'est. -->
    <section id="adminZone" class="d-none">
      <div class="section-head"><h2>Journal d'accès</h2></div>
      <div class="panel">
        <ul id="logList" class="list-group list-group-flush"></ul>
      </div>
    </section>
  </div>

  <script src="/batcave-client.js"></script>
  <script src="/bat-computer.js"></script>
</body>
</html>
