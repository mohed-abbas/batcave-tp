<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body class="center-screen">
  <div class="card card-batcave p-4">
    <div class="text-center mb-3">
      <i class="fa-solid fa-fingerprint fa-3x" style="color:#5fb2ff;"></i>
      <h2 class="bat-title mt-2">ACCÈS SÉCURISÉ</h2>
      <p class="text-muted small">Identifiez-vous pour recevoir votre badge</p>
    </div>

    <!-- fetch JSON : le serveur pose les deux cookies de jetons, puis le script
         redirige. Plus de POST formulaire classique. -->
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" name="password" required />
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember" name="remember" />
        <label class="form-check-label small text-muted" for="remember">
          Se souvenir de mon badge sur cet appareil
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Se connecter
      </button>
    </form>

    <div id="feedback" class="mt-3"></div>

    <div class="text-center mt-3">
      <a href="/register.html" class="text-info small">
        <i class="fa-solid fa-user-plus me-1"></i>Pas encore de badge ? S'inscrire
      </a>
    </div>
  </div>

  <script src="/batcave-client.js"></script>
  <script>
    const { postJSON, showError } = window.Batcave;

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const res = await postJSON('/auth/login', {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        remember: document.getElementById('remember').checked
      });

      if (res.ok) {
        window.location.href = '/bat-computer';
        return;
      }

      const data = await res.json().catch(() => ({}));
      showError(document.getElementById('feedback'), data.error || 'Erreur inconnue.');
    });
  </script>
</body>
</html>
