<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batcave — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="/batcave.css" rel="stylesheet" />
</head>
<body class="center-screen">
  <div class="card card-batcave p-4">
    <div class="text-center mb-3">
      <i class="fa-solid fa-fingerprint fa-3x bat-icon"></i>
      <h2 class="bat-title mt-2">ACCÈS SÉCURISÉ</h2>
      <p class="text-muted small">Identifiez-vous pour recevoir votre badge</p>
    </div>

    <!-- Étape 1 — mot de passe. Le serveur ne délivre aucun jeton ici : il ouvre
         seulement un sas en attente du second facteur. -->
    <div id="loginZone">
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" name="password" required />
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember" name="remember" />
        <label class="form-check-label small text-muted" for="remember">
          Se souvenir de mon badge sur cet appareil
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Se connecter
      </button>
    </form>

    <div id="feedback" class="mt-3"></div>

    <!-- Connexion externe : boutons injectés selon les providers configurés. -->
    <div id="oauthZone" class="mt-4 d-none">
      <div class="text-center text-muted small mb-2">ou continuer avec</div>
      <div id="oauthButtons" class="d-grid gap-2"></div>
    </div>

    <div class="text-center mt-3">
      <a href="/register.html" class="text-info small">
        <i class="fa-solid fa-user-plus me-1"></i>Pas encore de badge ? S'inscrire
      </a>
    </div>
    </div>

    <!-- Étape 2 — second facteur. Les cookies ne sont posés qu'après validation. -->
    <div id="otpZone" class="d-none">
      <p class="text-center small text-muted">
        <i class="fa-solid fa-mobile-screen me-1"></i>
        Saisissez le code affiché par votre application d'authentification.
      </p>
      <form id="otpForm" novalidate>
        <div class="mb-3">
          <label for="otpCode" class="form-label">Code à 6 chiffres</label>
          <input type="text" class="form-control text-center" id="otpCode"
                 inputmode="numeric" autocomplete="one-time-code" maxlength="6"
                 placeholder="000000" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fa-solid fa-shield-halved me-2"></i>Vérifier le code
        </button>
      </form>
      <div id="otpFeedback" class="mt-3"></div>
    </div>

    <!-- Enrôlement — affiché quand le compte n'a pas encore de second facteur. -->
    <div id="enrollZone" class="d-none">
      <p class="text-center small text-muted">
        Double authentification obligatoire.<br />
        Scannez ce QR code avec Google Authenticator, puis saisissez le premier code.
      </p>
      <div class="text-center mb-3">
        <img id="qrImage" alt="QR code d'enrôlement" class="img-fluid rounded bg-white p-2 bat-qr" />
      </div>
      <form id="enrollForm" novalidate>
        <div class="mb-3">
          <label for="enrollCode" class="form-label">Code de confirmation</label>
          <input type="text" class="form-control text-center" id="enrollCode"
                 inputmode="numeric" autocomplete="one-time-code" maxlength="6"
                 placeholder="000000" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fa-solid fa-lock me-2"></i>Activer la double authentification
        </button>
      </form>
      <div id="enrollFeedback" class="mt-3"></div>
    </div>
  </div>

  <script src="/batcave-client.js"></script>
  <script src="/login.js"></script>
</body>
</html>
